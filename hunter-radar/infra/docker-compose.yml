# Hunter Radar V1.6.0 — Infrastructure
# 一键起: docker compose up -d
# 停服务: docker compose down
# 重置数据: docker compose down -v

networks:
  hunter-net:
    driver: bridge

services:
  postgres:
    image: postgres:16-alpine
    container_name: hunter_postgres
    environment:
      POSTGRES_USER: hunter
      POSTGRES_PASSWORD: hunter
      POSTGRES_DB: hunter_radar
    ports:
      - "5432:5432"
    volumes:
      - hunter_pg_data:/var/lib/postgresql/data
      - ../backend/sql:/docker-entrypoint-initdb.d:ro
    networks:
      - hunter-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hunter -d hunter_radar"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: hunter_redis
    ports:
      - "6379:6379"
    networks:
      - hunter-net
    volumes:
      - hunter_redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  airflow-db:
    image: postgres:16-alpine
    container_name: hunter_airflow_db
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - hunter_airflow_db:/var/lib/postgresql/data
    networks:
      - hunter-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airflow"]
      interval: 5s
      timeout: 3s
      retries: 10

  airflow-webserver:
    image: apache/airflow:2.10.2-python3.12
    container_name: hunter_airflow_web
    depends_on:
      airflow-db:
        condition: service_healthy
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow-db/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__WEBSERVER__EXPOSE_CONFIG: "true"
      _PIP_ADDITIONAL_REQUIREMENTS: "apache-airflow-providers-postgres apache-airflow-providers-redis httpx tenacity beautifulsoup4 lxml pandas numpy scipy yfinance"
    ports:
      - "8080:8080"
    volumes:
      - ../backend/dags:/opt/airflow/dags:ro
      - ../backend/etl:/opt/airflow/etl:ro
    command: webserver
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5

  airflow-scheduler:
    image: apache/airflow:2.10.2-python3.12
    container_name: hunter_airflow_sched
    depends_on:
      airflow-db:
        condition: service_healthy
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow-db/airflow
      _PIP_ADDITIONAL_REQUIREMENTS: "apache-airflow-providers-postgres apache-airflow-providers-redis httpx tenacity beautifulsoup4 lxml pandas numpy scipy yfinance"
    volumes:
      - ../backend/dags:/opt/airflow/dags:ro
      - ../backend/etl:/opt/airflow/etl:ro
    command: scheduler

  # V1.6.0: Backend API service
  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: hunter_backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://hunter:hunter@postgres:5432/hunter_radar
      REDIS_URL: redis://redis:6379/0
      ENV: production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - hunter-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  # V1.6.0: ETL cron service (reuses backend image)
  etl-cron:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: hunter_etl_cron
    command: ["python", "-m", "etl.pipeline"]
    environment:
      DATABASE_URL: postgresql+asyncpg://hunter:hunter@postgres:5432/hunter_radar
      REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - hunter-net

volumes:
  hunter_pg_data:
  hunter_airflow_db:
  hunter_redis_data:
